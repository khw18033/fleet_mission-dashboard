apiVersion: v1
kind: ServiceAccount
metadata:
  name: central-hub-sa
  namespace: centralized
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: central-hub-sa-manager-role
rules:
- apiGroups:
  - ''
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - patch
- apiGroups:
  - ''
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ''
  resources:
  - configmaps
  - services
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: central-hub-sa-manager-binding
subjects:
- kind: ServiceAccount
  name: central-hub-sa
  namespace: centralized
roleRef:
  kind: ClusterRole
  name: central-hub-sa-manager-role
  apiGroup: rbac.authorization.k8s.io
