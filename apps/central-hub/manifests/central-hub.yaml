apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-hub
  namespace: centralized
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-hub
  template:
    metadata:
      labels:
        app: central-hub
    spec:
      serviceAccountName: central-hub-sa
      nodeSelector:
        kubernetes.io/hostname: change-me-central-hub-node
      tolerations:
      - operator: Exists
      containers:
      - name: central-hub
        image: jny123/central-hub:v32
        imagePullPolicy: Always
        # Use image default command
        ports:
        - containerPort: 5000
        env:
        - name: PYTHONUNBUFFERED
          value: '1'
---
apiVersion: v1
kind: Service
metadata:
  name: central-hub
  namespace: centralized
spec:
  type: NodePort
  selector:
    app: central-hub
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30005
