apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fallback-controller
  namespace: centralized
  labels:
    app: fallback-controller
spec:
  selector:
    matchLabels:
      app: fallback-controller
  template:
    metadata:
      labels:
        app: fallback-controller
    spec:
      nodeSelector:
        node-role: robot
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      volumes:
        - name: mission-store
          hostPath:
            path: /data/missions
            type: DirectoryOrCreate
      containers:
        - name: fallback-controller
          image: jny123/fallback-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ROBOT_ID
              valueFrom:
                configMapKeyRef:
                  name: robot-config
                  key: ROBOT_ID
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: REDIS_PORT
            - name: MQTT_HOST
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: MQTT_HOST
            - name: MQTT_PORT
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: MQTT_PORT
            - name: MISSION_STORE
              value: /data/missions
          volumeMounts:
            - name: mission-store
              mountPath: /data/missions
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
