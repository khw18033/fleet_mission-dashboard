apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mission-listener
  namespace: centralized
  labels:
    app: mission-listener
spec:
  selector:
    matchLabels:
      app: mission-listener
  template:
    metadata:
      labels:
        app: mission-listener
    spec:
      # robot role 노드에만 배포
      nodeSelector:
        node-role: robot
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      volumes:
        - name: mission-store
          hostPath:
            path: /data/missions
            type: DirectoryOrCreate
      containers:
        - name: listener
          image: jny123/mission-listener:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MQTT_HOST
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: MQTT_HOST
            - name: MQTT_PORT
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: MQTT_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: REDIS_PORT
            - name: ROBOT_ID
              valueFrom:
                configMapKeyRef:
                  name: robot-config
                  key: ROBOT_ID
            - name: ROBOT_TYPE
              valueFrom:
                configMapKeyRef:
                  name: robot-config
                  key: ROBOT_TYPE
            - name: ROBOT_ONLINE
              valueFrom:
                configMapKeyRef:
                  name: robot-config
                  key: ROBOT_ONLINE
            - name: BATTERY_LEVEL
              value: "100"              # 실제 환경에서는 telemetry-agent가 갱신
            - name: MISSION_STORE
              value: /data/missions
          volumeMounts:
            - name: mission-store
              mountPath: /data/missions
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
