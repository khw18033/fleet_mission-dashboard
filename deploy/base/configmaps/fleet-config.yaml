apiVersion: v1
kind: ConfigMap
metadata:
  name: fleet-config
  namespace: centralized
data:
  MQTT_HOST: "mqtt-broker.example.local"
  MQTT_PORT: "1883"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: robot-config
  namespace: centralized
data:
  ROBOT_ID:     "REPLACE_WITH_ROBOT_SN"
  ROBOT_TYPE:   "ep01"
  ROBOT_ONLINE: "true"
